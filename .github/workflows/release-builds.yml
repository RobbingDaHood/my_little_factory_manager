name: Release Builds

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to build for (e.g., v0.0.1). Leave empty to use latest release.'
        required: false

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_suffix: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_suffix: macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          set -e
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ github.event.inputs.release_tag }}"
            if [ -z "$TAG" ]; then
              echo "Fetching latest release tag..."
              TAG=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r '.tag_name' 2>/dev/null || echo "")
              if [ -z "$TAG" ]; then
                echo "::error::Could not determine release tag"
                exit 1
              fi
            fi
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Building for tag: $TAG"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features --target ${{ matrix.target }} -- -D warnings

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -vv

      - name: Prepare artifact
        shell: bash
        run: |
          set -e
          mkdir -p artifacts

          if [ "${{ runner.os }}" = "Windows" ]; then
            SOURCE_FILE="target/${{ matrix.target }}/release/my-little-factory-manager.exe"
          else
            SOURCE_FILE="target/${{ matrix.target }}/release/my-little-factory-manager"
          fi

          if [ ! -f "$SOURCE_FILE" ]; then
            echo "::error::Binary not found at $SOURCE_FILE"
            ls -la target/${{ matrix.target }}/release/ || echo "Release directory not found"
            exit 1
          fi

          cp "$SOURCE_FILE" "artifacts/my-little-factory-manager-${{ matrix.artifact_suffix }}"
          echo "Created artifact: artifacts/my-little-factory-manager-${{ matrix.artifact_suffix }}"
          ls -lh artifacts/

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -e
          ASSET_FILE=$(ls artifacts/my-little-factory-manager-*)
          ASSET_NAME=$(basename "$ASSET_FILE")

          echo "Uploading $ASSET_NAME to release $TAG..."
          gh release upload "$TAG" "$ASSET_FILE" --repo ${{ github.repository }} --clobber
