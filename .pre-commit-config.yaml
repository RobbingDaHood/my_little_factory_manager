repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt (auto-fix)
        entry: cargo fmt
        language: system
        pass_filenames: false
        always_run: true
      - id: cargo-clippy
        name: cargo clippy
        entry: bash scripts/check_clippy.sh
        language: system
        pass_filenames: false
        always_run: true

# Run all hooks even if one fails — report all errors at once
fail_fast: false
